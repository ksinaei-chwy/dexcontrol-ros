dataset:
  name: "vega_teleop_demonstrations"
  local_save_directory: "/tmp/dexmate_lerobot_datasets"
  recording_fps: 20
  task_instruction: "Pick up the object and place it in the target location"
  robot_type: "dexmate_vega_1_pro"
  use_videos: true

hugging_face:
  upload_enabled: false
  namespace: "local"
  # Leave empty to construct <namespace>/<dataset.name>.
  repo_id: ""
  private: true
  upload_policy: "on_session_end"  # manual, each_episode, on_session_end

cameras:
  head:
    # Recorder subscribes directly to DexTop/DexComm. It does not depend on
    # the Pico video bridge or create a sensor_msgs/Image DDS stream.
    stream_name: "left_rgb"
    transport: "zenoh"
    topic: "sensors/head_camera/left_rgb"
    rtc_channel: "sensors/head_camera/left_rgb_rtc"
    codec: "auto"
    placeholder_enabled: false
    resolution:
      width: 640
      height: 480
  left_wrist:
    # Future vendor stream: sensors/left_wrist_camera/rgb. No ROS topic has
    # been validated yet, so keep this empty while placeholder mode is active.
    stream_name: "rgb"
    transport: "zenoh"
    topic: ""
    rtc_channel: ""
    codec: "auto"
    placeholder_enabled: true
    resolution:
      width: 640
      height: 480
  right_wrist:
    # Future vendor stream: sensors/right_wrist_camera/rgb.
    stream_name: "rgb"
    transport: "zenoh"
    topic: ""
    rtc_channel: ""
    codec: "auto"
    placeholder_enabled: true
    resolution:
      width: 640
      height: 480

episode_control:
  start_key: "a"
  stop_key: "b"
  save_key: "c"
  discard_key: "d"
  debounce_seconds: 0.25
  minimum_frames: 10
  minimum_duration_seconds: 0.5
  # terminal, linux_input_event, or disabled. linux_input_event works without
  # X11 and requires input_device plus OS read permission.
  input_backend: "terminal"
  input_device: ""
  autosave_on_shutdown: false

validation:
  maximum_state_age_seconds: 0.1
  maximum_action_age_seconds: 0.1
  # Direct RGB measured 156-177 ms from DexTop capture to local receipt.
  # Validate capture, receipt freshness, and transport independently.
  maximum_receive_age_seconds: 0.10
  maximum_capture_age_seconds: 0.30
  maximum_transport_delay_seconds: 0.25

topics:
  # The live F5D6 hands expose measured position but not joint velocity.
  # Record measured positions from /joint_states and ignore its compatibility
  # velocity values by keeping include_joint_velocities false below.
  joint_states: "/joint_states"
  applied_joint_commands: "/dexcontrol/applied_joint_commands"
  measured_base_twist: "/dexcontrol/measured_base_twist"
  applied_base_twist: "/dexcontrol/applied_base_twist"

# Exact order used by both adapters. State stores measured position in this
# order for torso/head/arms and reconstructs two ratios per hand. Action stores
# post-bridge targets for torso/head/arms and reconstructs the same hand ratios.
# Both append base vx/vy/wz.
robot_features:
  include_joint_velocities: false
  joint_names:
    - torso_j1
    - torso_j2
    - torso_j3
    - head_j1
    - head_j2
    - head_j3
    - L_arm_j1
    - L_arm_j2
    - L_arm_j3
    - L_arm_j4
    - L_arm_j5
    - L_arm_j6
    - L_arm_j7
    - R_arm_j1
    - R_arm_j2
    - R_arm_j3
    - R_arm_j4
    - R_arm_j5
    - R_arm_j6
    - R_arm_j7
    - L_th_j1
    - L_ff_j1
    - L_mf_j1
    - L_rf_j1
    - L_lf_j1
    - L_th_j0
    - R_th_j1
    - R_ff_j1
    - R_mf_j1
    - R_rf_j1
    - R_lf_j1
    - R_th_j0
  # Must match the active Pico teleop F5D6 endpoints. Ratios are ordered
  # open_close then thumb_opposition, with 0=open/unopposed and
  # 1=closed/opposed. Applied targets that disagree by more than the configured
  # unitless ratio tolerance are rejected rather than compressed lossily.
  hand_synergies:
    left:
      joint_names: [L_th_j1, L_ff_j1, L_mf_j1, L_rf_j1, L_lf_j1, L_th_j0]
      open_positions: [0.1834, 0.2891, 0.2801, 0.2840, 0.2811, -0.0158]
      closed_positions: [-0.1, -1.0946, -1.0844, -1.0154, -1.0118, 0.84]
      action_ratio_tolerance: 0.02
    right:
      joint_names: [R_th_j1, R_ff_j1, R_mf_j1, R_rf_j1, R_lf_j1, R_th_j0]
      open_positions: [0.1834, 0.2891, 0.2801, 0.2840, 0.2811, -0.0158]
      closed_positions: [-0.1, -1.0946, -1.0844, -1.0154, -1.0118, 0.84]
      action_ratio_tolerance: 0.02

writer:
  frame_queue_size: 64
  image_writer_threads: 4
  # False uses LeRobot's asynchronous image writer and encodes video at save.
  # Enable only after validating the installed LeRobot encoder on the target.
  streaming_encoding: false
