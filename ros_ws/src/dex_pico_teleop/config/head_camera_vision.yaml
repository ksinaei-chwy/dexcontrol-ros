dexmate_head_camera_vision:
  ros__parameters:
    enabled: true
    qos_depth: 10

    # DexTop source: direct, capacity-one DexComm subscriptions. RGB and depth
    # stay outside ROS/DDS so headset backpressure cannot stall acquisition.
    sensor_name: head_camera
    stream_name: left_rgb
    camera_transport: zenoh
    camera_topic: sensors/head_camera/left_rgb
    source_rtc_channel: sensors/head_camera/left_rgb_rtc
    source_codec: auto
    depth_enabled: true
    depth_topic: sensors/head_camera/depth

    # XRoboToolkit Remote Vision should subscribe to this RTC channel.
    rtc_enabled: true
    rtc_channel: xrobotoolkit/remote_vision/head_camera/left_rgb_rtc
    rtc_profile: local
    codec: auto
    width: 1280
    height: 720
    fps: 30.0
    bitrate: 1500000

    # XRoboToolkit ZED Mini mode is a direct TCP H.264 stream to the headset.
    # Set xrtcp_enabled true and xrtcp_host to the Pico headset IP when using
    # Select ZEDMINI -> Listen in XRoboToolkit.
    xrtcp_enabled: false
    xrtcp_host: ""
    xrtcp_port: 12345
    xrtcp_side_by_side: true
    xrtcp_bitrate: 4000000
    xrtcp_connect_timeout_s: 0.25
    xrtcp_write_timeout_s: 2.0
    xrtcp_reconnect_interval_s: 1.0

    first_frame_timeout_s: 5.0
    status_rate_hz: 1.0
